apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:<your-github>.git
    targetRevision: main
    path: clusters/intsvc-k8s/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true